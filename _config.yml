title: Fr. Conor Donnelly Meditations
description: A collection of meditations by Fr. Conor Donnelly
baseurl: "/meditations"  # The subpath of your site (important for GitHub Pages)
url: "https://frconor-ebook.github.io" # Your site's URL
permalink: /homilies/:title/
markdown: kramdown

# Meditations live in _meditations/ as a collection: filenames are slugs
# (no dates), so regeneration is idempotent and URLs never change
collections:
  meditations:
    output: true
    permalink: /homilies/:name/

# Build settings
source: .
destination: ./docs
plugins:
  - jekyll-feed

# Include an exclude
include:
  - "data/"
  - ".nojekyll"  # copied into docs/ so GitHub Pages serves it raw (no second Jekyll pass)

exclude:
  - "data/meditations.json"
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor"
  - "create_project.sh"
  - "transcript_proofread_markdown_small/"
  - "transcript_proofread_markdown/"
  - "README.md"
  - "IMPROVEMENTS.md"
  - "process_markdown.py"
  - ".gitignore"
  - "docs/README.md"

# ADD THIS SECTION
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "data" # Apply these settings to files in _data
    values:
      sitemap: false  # Exclude data files from sitemap (optional but recommended)
